<div class="login-container">

  <!-- CARD -->
  <div class="login-card">
    <h1>Login</h1>
    <p class="subtitle">Step back into your botanical sanctuary</p>

    <!-- EMAIL -->
    <label>Email Address</label>
    <input type="email" placeholder="nature@bloomaura.com">

    <!-- PASSWORD -->
    <div class="password-row">
      <label>Password</label>
      <a href="#">Forgot password?</a>
    </div>
    <input type="password" placeholder="••••••••">

    <!-- REMEMBER -->
    <div class="remember">
      <input type="checkbox">
      <span>Remember me for 30 days</span>
    </div>

    <!-- BUTTON -->
    <button routerLink="/home" class="btn-primary">Sign In</button>

    <!-- DIVIDER -->
    <div class="divider">
      <span>Or continue with</span>
    </div>

    <!-- SOCIAL -->
    <div class="socials">
      <button class="social-btn">Google</button>
      <button class="social-btn">Apple</button>
    </div>

    <!-- SIGNUP -->
    <p class="signup">
      Don’t have an account? <a routerLink="/register">Join the garden</a>
    </p>
  </div>

  <!-- FOOTER -->
  <p class="copyright">
    © 2024 BLOOMAURA BOTANICAL. ALL RIGHTS RESERVED.
  </p>

</div>
