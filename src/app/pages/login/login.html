<div class="login-container">
  <div class="login-card">
    <h1>Login</h1>
    <p class="subtitle">Step back into your botanical sanctuary</p>

    <!-- USERNAME -->
    <label>Username</label>
    <input
      type="text"
      placeholder="Enter username"
      [(ngModel)]="username"
    />

    <!-- PASSWORD -->
    <div class="password-row">
      <label>Password</label>
      <a href="#">Forgot password?</a>
    </div>

    <input
      type="password"
      placeholder="Enter password"
      [(ngModel)]="password"
    />

    <!-- REMEMBER -->
    <div class="remember">
      <input type="checkbox">
      <span>Remember me for 30 days</span>
    </div>

    <!-- LOGIN BUTTON -->
    <button (click)="login()" class="btn-primary">
      Sign In
    </button>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="socials">
      <button class="social-btn">Google</button>
      <button class="social-btn">Apple</button>
    </div>

    <p class="signup">
      Don’t have an account?
      <a routerLink="/register">Join the garden</a>
    </p>
  </div>

  <p class="copyright">
    © 2024 BLOOMAURA BOTANICAL. ALL RIGHTS RESERVED.
  </p>
</div>
